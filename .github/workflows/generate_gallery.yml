name: Generate Gallery Data

on:
  push:
    branches:
      - main
    paths:
      - 'img/**'
      - 'generate_gallery_data.py'
      - '.github/workflows/generate_gallery.yml'

concurrency:
  group: generate-gallery-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_data:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Generate gallery_data.js
      run: python generate_gallery_data.py

    - name: Commit generated gallery data
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add gallery_data.js
        if git diff --staged --quiet; then
          echo "gallery_data.js is already up to date."
          exit 0
        fi
        git commit -m "chore: Auto-generate gallery_data.js"
        git pull --rebase origin main
        git push origin HEAD:main
